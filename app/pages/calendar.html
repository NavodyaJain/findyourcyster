<!-- pages/calendar.html · FindYourCyster Cycle Calendar -->
<style>
.cal-wrap{max-width:100%;padding:20px 24px 48px;}
.cal-top{display:grid;grid-template-columns:1fr 320px;gap:20px;margin-bottom:20px;}

/* calendar card */
.cal-card{background:white;border-radius:24px;padding:24px;border:1px solid rgba(232,193,197,.2);box-shadow:0 4px 20px rgba(30,26,26,.06);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.cal-month{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#1e1a1a;}
.cal-nav-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(232,193,197,.4);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .25s ease;color:#5a4f4f;}
.cal-nav-btn:hover{background:#fce4e6;border-color:#c99ea4;color:#1e1a1a;}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#9e8e8e;padding:6px 0;}
.cal-day{
  aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  font-size:13px;font-weight:500;color:#1e1a1a;
  transition:all .2s ease;position:relative;border:1.5px solid transparent;
}
.cal-day:hover{background:#fce4e6;}
.cal-day.today{background:#1e1a1a;color:white;font-weight:700;}
.cal-day.today:hover{background:#3a3030;}
.cal-day.other-month{color:#ccc;}
.cal-day.period{background:#fce4e6;border-color:rgba(232,193,197,.6);}
.cal-day.period::after{content:'';width:5px;height:5px;border-radius:50%;background:#c99ea4;position:absolute;bottom:3px;}
.cal-day.ovulation{background:#c8deca;border-color:rgba(122,158,128,.4);}
.cal-day.ovulation::after{content:'';width:5px;height:5px;border-radius:50%;background:#7a9e80;position:absolute;bottom:3px;}
.cal-day.fertile{background:#ece8f6;border-color:rgba(164,148,196,.3);}
.cal-day.fertile::after{content:'';width:5px;height:5px;border-radius:50%;background:#a494c4;position:absolute;bottom:3px;}
.cal-day.selected{border-color:#c99ea4 !important;box-shadow:0 0 0 3px rgba(232,193,197,.3);}
.cal-day.has-symptom::before{content:'·';position:absolute;top:1px;right:4px;font-size:18px;color:#c99ea4;line-height:1;}

/* legend */
.cal-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#5a4f4f;}
.legend-dot{width:10px;height:10px;border-radius:50%;}

/* right panel */
.cal-right{display:flex;flex-direction:column;gap:14px;}

/* log panel */
.log-panel{background:white;border-radius:22px;padding:20px;border:1px solid rgba(232,193,197,.2);box-shadow:0 4px 16px rgba(30,26,26,.06);}
.lp-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:#1e1a1a;margin-bottom:4px;}
.lp-date{font-size:12px;color:#9e8e8e;margin-bottom:16px;}

.log-section{margin-bottom:14px;}
.ls-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#9e8e8e;margin-bottom:8px;}

/* flow selector */
.flow-btns{display:flex;gap:6px;}
.flow-btn{flex:1;padding:8px 4px;border-radius:12px;border:1.5px solid rgba(232,193,197,.3);background:rgba(255,255,255,.6);font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .2s ease;}
.flow-btn:hover{border-color:#c99ea4;}
.flow-btn.on{background:#fce4e6;border-color:#c99ea4;font-weight:600;}

/* symptom chips */
.sym-chips{display:flex;flex-wrap:wrap;gap:6px;}
.sym-chip{padding:5px 12px;border-radius:999px;border:1.5px solid rgba(232,193,197,.3);background:rgba(255,255,255,.6);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s ease;}
.sym-chip:hover{border-color:#c99ea4;}
.sym-chip.on{background:#fce4e6;border-color:#c99ea4;}

.log-note{width:100%;min-height:72px;border:1.5px solid rgba(232,193,197,.3);border-radius:14px;padding:10px 13px;font-family:'Outfit',sans-serif;font-size:13px;color:#1e1a1a;resize:none;outline:none;transition:all .25s ease;background:rgba(255,255,255,.7);}
.log-note:focus{border-color:#c99ea4;box-shadow:0 0 0 3px rgba(232,193,197,.15);}

.log-save-btn{width:100%;padding:12px;border-radius:999px;background:#1e1a1a;color:white;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .25s ease;margin-top:4px;}
.log-save-btn:hover{background:#3a3030;transform:translateY(-1px);}

/* cycle stats card */
.cycle-stats{background:linear-gradient(135deg,#fdf0f1,white);border-radius:22px;padding:20px;border:1px solid rgba(232,193,197,.2);box-shadow:0 4px 16px rgba(30,26,26,.06);}
.cs-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#9e8e8e;margin-bottom:14px;}
.cs-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(232,193,197,.12);font-size:13px;color:#5a4f4f;}
.cs-row:last-child{border-bottom:none;}
.cs-val{font-weight:700;font-size:15px;color:#1e1a1a;}

@media(max-width:900px){.cal-top{grid-template-columns:1fr;}.cal-right{flex-direction:row;flex-wrap:wrap;}.log-panel,.cycle-stats{flex:1;min-width:260px;}}
@media(max-width:600px){.cal-wrap{padding:16px 14px 40px;}.cal-right{flex-direction:column;}}
</style>

<div class="cal-wrap">
  <div class="cal-top">

    <!-- Calendar -->
    <div class="cal-card">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="cal-month-title">April 2026</div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#c99ea4"></div>Period</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7a9e80"></div>Ovulation</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a494c4"></div>Fertile window</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1e1a1a"></div>Today</div>
      </div>
    </div>

    <!-- Right panel -->
    <div class="cal-right">

      <!-- Log panel -->
      <div class="log-panel">
        <div class="lp-title">Log for <span id="log-date-title">Today</span></div>
        <div class="lp-date" id="log-date-sub">April 12, 2026</div>

        <div class="log-section">
          <div class="ls-label">Flow</div>
          <div class="flow-btns">
            <div class="flow-btn" onclick="toggleFlow(this)">💧 Light</div>
            <div class="flow-btn" onclick="toggleFlow(this)">🩸 Medium</div>
            <div class="flow-btn" onclick="toggleFlow(this)">🌊 Heavy</div>
            <div class="flow-btn" onclick="toggleFlow(this)">— None</div>
          </div>
        </div>

        <div class="log-section">
          <div class="ls-label">Symptoms</div>
          <div class="sym-chips" id="sym-chips"></div>
        </div>

        <div class="log-section">
          <div class="ls-label">Notes</div>
          <textarea class="log-note" placeholder="How are you feeling today?"></textarea>
        </div>

        <button class="log-save-btn" onclick="saveLog()">Save Log ✓</button>
      </div>

      <!-- Cycle stats -->
      <div class="cycle-stats">
        <div class="cs-title">📊 Cycle Insights</div>
        <div class="cs-row"><span>Avg cycle length</span><span class="cs-val">38 days</span></div>
        <div class="cs-row"><span>Last period</span><span class="cs-val">Mar 5</span></div>
        <div class="cs-row"><span>Next predicted</span><span class="cs-val">Apr 12</span></div>
        <div class="cs-row"><span>Period duration</span><span class="cs-val">5–6 days</span></div>
        <div class="cs-row"><span>Tracked cycles</span><span class="cs-val">4</span></div>
      </div>

    </div>
  </div>
</div>

<script>
(function() {
  let viewYear = 2026, viewMonth = 3; // April 2026 (0-indexed)
  let selectedDay = 12;

  /* Demo period/ovulation data */
  const PHASE_DATA = {
    '2026-3-1':  'period',  '2026-3-2': 'period', '2026-3-3': 'period',
    '2026-3-4':  'period',  '2026-3-5': 'period',
    '2026-3-15': 'fertile', '2026-3-16':'fertile', '2026-3-17':'ovulation',
    '2026-3-18': 'fertile', '2026-3-19':'fertile',
    '2026-4-12': 'period',  '2026-4-13':'period',  '2026-4-14':'period',
    '2026-4-15': 'period',  '2026-4-16':'period',
    '2026-4-26': 'fertile', '2026-4-27':'fertile', '2026-4-28':'ovulation',
    '2026-4-29': 'fertile',
  };
  const logged = JSON.parse(localStorage.getItem('fyc_cal_log')||'{}');

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOWS = ['S','M','T','W','T','F','S'];

  function renderCalendar() {
    document.getElementById('cal-month-title').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    DOWS.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();
    const today = new Date();

    /* prev month fill */
    for (let i = firstDay-1; i >= 0; i--) {
      addDayCell(daysInPrev-i, viewMonth-1, true, grid);
    }
    /* current month */
    for (let d = 1; d <= daysInMonth; d++) {
      addDayCell(d, viewMonth, false, grid);
    }
    /* next month fill */
    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
    for (let d = 1; d <= totalCells - firstDay - daysInMonth; d++) {
      addDayCell(d, viewMonth+1, true, grid);
    }
  }

  function addDayCell(day, month, otherMonth, grid) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    if (otherMonth) el.classList.add('other-month');

    const key = `${viewYear}-${month + 1}-${day}`;
    const today = new Date();
    if (!otherMonth && day === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear()) {
      el.classList.add('today');
    }
    if (!otherMonth && PHASE_DATA[key]) el.classList.add(PHASE_DATA[key]);
    if (!otherMonth && logged[key]) el.classList.add('has-symptom');
    if (!otherMonth && day === selectedDay) el.classList.add('selected');

    el.textContent = day;
    if (!otherMonth) {
      el.addEventListener('click', () => { selectedDay = day; selectDay(day, month); renderCalendar(); });
    }
    grid.appendChild(el);
  }

  function selectDay(day, month) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('log-date-title').textContent = `${months[month]} ${day}`;
    document.getElementById('log-date-sub').textContent   = `${MONTHS[month]} ${day}, ${viewYear}`;
  }

  window.changeMonth = function(dir) {
    viewMonth += dir;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    renderCalendar();
  };

  /* symptom chips */
  const SYMS = ['Cramps','Headache','Fatigue','Bloating','Mood swings','Acne','Back pain','Nausea','Brain fog','Tender'];
  const chipsEl = document.getElementById('sym-chips');
  SYMS.forEach(s => {
    const c = document.createElement('div');
    c.className = 'sym-chip';
    c.textContent = s;
    c.addEventListener('click', () => c.classList.toggle('on'));
    chipsEl.appendChild(c);
  });

  window.toggleFlow = function(btn) {
    document.querySelectorAll('.flow-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
  };

  window.saveLog = function() {
    const key = `${viewYear}-${viewMonth}-${selectedDay}`;
    const syms = [...document.querySelectorAll('.sym-chip.on')].map(c=>c.textContent);
    const flow = document.querySelector('.flow-btn.on')?.textContent || '';
    logged[key] = {syms, flow};
    localStorage.setItem('fyc_cal_log', JSON.stringify(logged));
    renderCalendar();
    /* toast */
    const t = document.createElement('div');
    t.textContent = '✓ Log saved';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1a1a;color:white;padding:10px 22px;border-radius:999px;font-family:Outfit,sans-serif;font-size:14px;font-weight:500;z-index:999;animation:fadeDown .3s ease;';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2000);
  };

  selectDay(12, 3);
  renderCalendar();
})();
</script>
